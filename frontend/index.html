<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutor 3D de Cubo Rubik</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Panel de control -->
        <div class="control-panel">
            <h1>🎲 Resolutor 3D de Cubo Rubik</h1>
            <p class="instructions">
                🖱️ <strong>Arrastra</strong> para rotar la vista | 
                🎨 <strong>Selecciona color</strong> y haz click en las caras |
                🔧 <strong>Rueda del mouse</strong> para zoom
            </p>
            
            <!-- Selector de colores -->
            <div class="color-picker">
                <button class="color-btn active" data-color="U" style="background-color: white;" title="Up (Blanco)"></button>
                <button class="color-btn" data-color="R" style="background-color: #009E60;" title="Right (Verde)"></button>
                <button class="color-btn" data-color="F" style="background-color: #C41E3A;" title="Front (Rojo)"></button>
                <button class="color-btn" data-color="D" style="background-color: #FFD500;" title="Down (Amarillo)"></button>
                <button class="color-btn" data-color="L" style="background-color: #FF5800;" title="Left (Naranja)"></button>
                <button class="color-btn" data-color="B" style="background-color: #0051BA;" title="Back (Azul)"></button>
            </div>
            
            <!-- Botones de acción -->
            <div class="action-buttons">
                <button id="solveBtn" class="btn btn-solve">✨ Resolver Cubo</button>
                <button id="resetBtn" class="btn btn-reset">🔄 Reiniciar</button>
                <button id="scrambleBtn" class="btn btn-scramble">🔀 Mezclar</button>
            </div>
            
            <!-- Estado actual -->
            <div class="status-info">
                <span id="stickersCount">Stickers pintados: 0/54</span>
                <span id="cubeStatus">Estado: ⚠️ Incompleto</span>
            </div>
        </div>
        
        <!-- Visor 3D del cubo -->
        <div class="cube-viewer" id="cubeViewer"></div>
        
        <!-- Panel de solución -->
        <div id="solutionPanel" class="solution-panel hidden">
            <h3>✅ Solución encontrada</h3>
            <p id="solutionInfo"></p>
            <div id="stepsContainer"></div>
            <button id="closeSolution" class="btn btn-close">Cerrar</button>
        </div>
        
        <!-- Loading overlay -->
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="spinner"></div>
            <p>Calculando solución...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
